services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: collab-editor-backend
    ports:
      - "${BACKEND_PORT:-3002}:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_API_PROVIDER=${LLM_API_PROVIDER:-ollama}
      - LLM_API_BASE_URL=${LLM_API_BASE_URL:-http://host.docker.internal:11434/v1}
      - LLM_MODEL=${LLM_MODEL:-mistral}
    healthcheck:
      test: ["CMD", "node", "-e", "const http = require('http'); const req = http.get('http://localhost:3001/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1); }); req.on('error', () => process.exit(1)); setTimeout(() => process.exit(1), 5000);"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - collab-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: collab-editor-frontend
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    environment:
      - VITE_API_BASE_URL=http://backend:3001
      - VITE_WS_URL=ws://backend:3001
    depends_on:
      backend:
        condition: service_healthy
      # Ollama is expected to run on the host (host.docker.internal)
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - collab-network
    restart: unless-stopped

  # Ollama is not started as a container here; the backend will use
  # the host address configured via `LLM_API_BASE_URL` (e.g. host.docker.internal:11434).

networks:
  collab-network:
    driver: bridge

volumes:
  backend-data:
  # ollama-data removed; Ollama expected on host
